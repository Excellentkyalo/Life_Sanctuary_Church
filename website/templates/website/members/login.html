{% extends 'website/base.html' %}
{% block content %}
<section class="hero" style="min-height: 80vh;">
    <div class="hero-content">
        <h1>Login</h1>
        <form method="POST" style="max-width: 400px; margin: 2rem auto;">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" style="width: 100%; padding: 1rem; margin-bottom: 1rem; border-radius: 10px; border: 1px solid var(--primary-gold); background: var(--glass-bg); color: var(--white);">
            <input type="password" name="password" placeholder="Password" style="width: 100%; padding: 1rem; margin-bottom: 1rem; border-radius: 10px; border: 1px solid var(--primary-gold); background: var(--glass-bg); color: var(--white);">
            <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
        </form>
        <p>Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary-gold);">Register</a></p>
    </div>
</section>
{% endblock %}
